<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <title>Cadastro</title>
    <link rel="shortcut icon" href="img/white_logo.png" type="png">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="img/black_logo.png">
                <h1>Bookstore</h1>
            </a>
        </div>
        <nav>
            <a href="index.html">Início</a>
            <a href="shelf.html">Livros</a>
            <a href="index.html#contact">Contato</a>
        </nav>
        <div id="user">
            <a href="">
                <img src="img/shopping_cart.png">
            </a>
            <a href="register.html">
                <img src="img/user.png">
            </a>
        </div>
    </header>
    <main>
        <form>
            <h1>Cadastro</h1>
            <div class="input_group">
                <input type="text" class="input" name="name" id="name" placeholder=" " required>
                <label for="name" class="user_label">Nome</label>
            </div>
            <div class="input_group">
                <input type="email" class="input" name="email" id="email" placeholder=" " required>
                <label for="email" class="user_label">E-mail</label>
            </div>
            <div class="input_group">
                <input type="password" class="input" name="password" id="password" placeholder=" " required>
                <label for="password" class="user_label">Senha</label>
            </div>
            <div class="input_group">
                <input type="password" class="input" name="confirm" id="confirm" placeholder=" " required>
                <label for="confirm" class="user_label">Confirmar Senha</label>
            </div>
            <input type="submit" class="submit">
        </form>
    </main>
    <footer>
        <div class="socials">
            <div class="logo">
                <a href="index.html">
                    <img src="img/white_logo.png">
                    <h1>Bookstore</h1>
                </a>
                <p>Desperte o seu hábito de leitura conosco!</p>
            </div>
            <div class="follow_us">
                <h1>Siga-nos</h1>
                <div>
                    <a href=""><i class="fa-brands fa-facebook"></i></a>
                    <a href=""><i class="fa-brands fa-instagram"></i></a>
                </div>
            </div>
        </div>
        <div class="footer_column">
            <h1>Nossa Estante</h1>
            <a href="">Mais vendidos</a>
            <a href="">Lançamentos</a>
            <a href="">Promoções</a>
        </div>
        <div class="footer_column">
            <h1>Sobre Nós</h1>
            <a href="">Quem Somos</a>
            <a href="">Blog</a>
            <a href="">Eventos</a>
        </div>
        <div class="footer_column">
            <h1>Ajuda</h1>
            <a href="">Suporte</a>
            <a href="">FAQ</a>
        </div>
        <div class="footer_column">
            <h1>Contato</h1>
            <p>+55 (11) 4004-4004</p>
            <p>contato@bookstore.com</p>
        </div>
    </footer>
</body>
</html>
